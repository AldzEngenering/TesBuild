name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL to convert'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL (optional)'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ==================== CHECKOUT ====================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ==================== SETUP JAVA ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ==================== SETUP ANDROID SDK ====================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-${{ env.ANDROID_SDK_VERSION }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            extras;android;m2repository
            extras;google;m2repository

      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      # ==================== SETUP FLUTTER ====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: |
          flutter doctor -v
          flutter --version

      # ==================== CREATE FLUTTER PROJECT ====================
      - name: Create Flutter Web Project
        id: create_project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd 'a-zA-Z0-9_')
          
          echo "📱 Creating Flutter project: $SAFE_NAME"
          
          # Create project
          flutter create --platforms=android,web --org=com.web2app "$SAFE_NAME"
          
          cd "$SAFE_NAME"
          
          echo "✅ Project created"
          echo "project_dir=$SAFE_NAME" >> $GITHUB_OUTPUT

      # ==================== DOWNLOAD ICON ====================
      - name: Download Icon
        id: download_icon
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          ICON_URL="${{ github.event.inputs.icon_url }}"
          
          cd "$PROJECT_DIR"
          
          echo "🖼️ Downloading icon..."
          
          # Download icon
          if [ -n "$ICON_URL" ]; then
            curl -L -o icon.png "$ICON_URL" || echo "⚠️ Failed to download icon"
          fi
          
          # Create default icon if download failed
          if [ ! -f icon.png ]; then
            echo "🎨 Creating default icon..."
            convert -size 512x512 xc:blue icon.png || {
              # Fallback: create a simple colored icon using ImageMagick
              # If ImageMagick not available, create a 1x1 PNG
              echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icon.png
            }
          fi
          
          if [ -f icon.png ]; then
            echo "✅ Icon downloaded/saved"
            echo "icon_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No icon available"
            echo "icon_exists=false" >> $GITHUB_OUTPUT
          fi

      # ==================== CONFIGURE WEBVIEW ====================
      - name: Configure WebView
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          cd "$PROJECT_DIR"
          
          echo "🌐 Configuring WebView for: $WEB_URL"
          
          # Add webview_flutter dependency
          cat >> pubspec.yaml << 'EOF'
          
          dependencies:
            webview_flutter: ^4.10.0
          EOF
          
          # Update main.dart
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() => runApp(const MyApp());
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
          
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '$APP_NAME',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: const WebViewApp(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewApp extends StatefulWidget {
            const WebViewApp({super.key});
          
            @override
            State<WebViewApp> createState() => _WebViewAppState();
          }
          
          class _WebViewAppState extends State<WebViewApp> {
            late final WebViewController controller;
          
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onProgress: (int progress) {
                      // Update loading bar if needed
                    },
                    onPageStarted: (String url) {
                      // Page started loading
                    },
                    onPageFinished: (String url) {
                      // Page finished loading
                    },
                    onWebResourceError: (WebResourceError error) {
                      // Handle error
                    },
                  ),
                )
                ..loadRequest(Uri.parse('$WEB_URL'));
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF
          
          # Replace APP_NAME and WEB_URL in main.dart
          sed -i "s/\$APP_NAME/$APP_NAME/g" lib/main.dart
          sed -i "s|\$WEB_URL|$WEB_URL|g" lib/main.dart
          
          echo "✅ WebView configured"

      # ==================== APPLY ICON ====================
      - name: Apply App Icon
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          
          cd "$PROJECT_DIR"
          
          if [ -f icon.png ]; then
            echo "🖼️ Applying app icon..."
            
            # Create Android icons
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            
            # Use flutter command for icon generation if available
            if command -v flutter &> /dev/null; then
              flutter pub add flutter_launcher_icons 2>/dev/null || true
              
              # Create config
              cat > flutter_launcher_icons.yaml << 'EOF'
              flutter_launcher_icons:
                android: true
                ios: false
                image_path: "icon.png"
                adaptive_icon_background: "#ffffff"
                adaptive_icon_foreground: "icon.png"
                min_sdk_android: 21
              EOF
              
              flutter pub get 2>/dev/null || true
              flutter pub run flutter_launcher_icons:main 2>/dev/null || {
                echo "⚠️ flutter_launcher_icons failed, using manual method..."
                # Manual icon creation
                convert icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
                convert icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
                convert icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
                convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
                convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
              }
            fi
            
            echo "✅ Icon applied"
          fi

      # ==================== ANDROID PERMISSIONS ====================
      - name: Configure Android Permissions
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          
          cd "$PROJECT_DIR"
          
          echo "📝 Configuring Android permissions..."
          
          # Update AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST" ]; then
            # Add internet permission if not exists
            if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
              sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
            fi
            
            # Add usesCleartextTraffic
            if ! grep -q "android:usesCleartextTraffic" "$MANIFEST"; then
              sed -i '/<application/s/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
            fi
          fi
          
          echo "✅ Android permissions configured"

      # ==================== FLUTTER CLEAN ====================
      - name: Flutter Clean
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          flutter clean

      # ==================== FLUTTER PUB GET ====================
      - name: Flutter Pub Get
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          
          flutter pub get
          flutter pub upgrade --major-versions

      # ==================== BUILD WEB ====================
      - name: Build Web
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          
          echo "🌐 Building web version..."
          flutter build web --release
          
          if [ -d "build/web" ]; then
            echo "✅ Web build successful"
          else
            echo "⚠️ Web build skipped"
          fi

      # ==================== BUILD APK ====================
      - name: Build APK
        id: build_apk
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          
          echo "📱 Building APK..."
          
          # Build release APK
          flutter build apk --release
          
          # Check if build succeeded
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ APK build failed"
            echo "📂 Checking build directory..."
            find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
            exit 1
          fi

      # ==================== COLLECT OUTPUT ====================
      - name: Collect Output
        run: |
          PROJECT_DIR="${{ steps.create_project.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          
          mkdir -p ../output
          
          # Copy APK
          if [ -f "${{ steps.build_apk.outputs.apk_path }}" ]; then
            cp "${{ steps.build_apk.outputs.apk_path }}" "../output/app-release.apk"
            echo "✅ APK copied to output"
          fi
          
          # Copy web build if exists
          if [ -d "build/web" ]; then
            cp -r build/web "../output/web" 2>/dev/null || true
            echo "✅ Web build copied to output"
          fi

      # ==================== VERIFY APK STRUCTURE ====================
      - name: Verify APK Structure
        run: |
          cd output
          
          echo "🔍 Verifying APK structure..."
          
          if [ -f "app-release.apk" ]; then
            echo "📦 Checking APK contents..."
            
            # Extract and verify APK contents
            mkdir -p apk_extracted
            cd apk_extracted
            unzip -q ../app-release.apk
            
            echo "📋 APK Structure:"
            ls -la
            
            # Required files/directories
            REQUIRED_ITEMS="assets/dexopt assets/flutter_assets kotlin lib META-INF res AndroidManifest.xml classes.dex resources.arsc"
            
            MISSING=0
            for ITEM in $REQUIRED_ITEMS; do
              if [ -e "$ITEM" ]; then
                echo "  ✅ $ITEM found"
              else
                echo "  ❌ $ITEM missing"
                MISSING=$((MISSING+1))
              fi
            done
            
            # Check additional files
            [ -f "DebugProbesKt.bin" ] && echo "  ✅ DebugProbesKt.bin found" || echo "  ⚠️ DebugProbesKt.bin not found"
            [ -f "kotlin-tooling-metadata.json" ] && echo "  ✅ kotlin-tooling-metadata.json found" || echo "  ⚠️ kotlin-tooling-metadata.json not found"
            
            if [ $MISSING -eq 0 ]; then
              echo "✅ APK structure is complete!"
            else
              echo "⚠️ APK has $MISSING missing items"
            fi
            
            cd ..
          else
            echo "❌ No APK found to verify"
          fi

      # ==================== UPLOAD ARTIFACT ====================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-output
          path: |
            output/app-release.apk
            output/web/
          retention-days: 7
          compression-level: 9

      # ==================== CREATE RELEASE ====================
      - name: Create Release
        id: create_release
        if: success()
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd 'a-zA-Z0-9_')
          
          TAG="web2apk-${SAFE_NAME}-$(date +%Y%m%d%H%M)"
          
          echo "📦 Creating release: $TAG"
          
          # Create release
          gh release create "$TAG" \
            output/app-release.apk \
            --repo "${{ github.repository }}" \
            --title "Web2APK: $APP_NAME" \
            --notes "Web to APK build for: $APP_NAME
          URL: ${{ github.event.inputs.web_url }}
          Built: $(date)
          " \
            --prerelease
            
          RELEASE_URL=$(gh release view "$TAG" --json htmlUrl -q .htmlUrl)
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          echo "✅ Release created: $RELEASE_URL"

      # ==================== FINAL SUMMARY ====================
      - name: Build Summary
        run: |
          echo "## 🎉 Web to APK Build Completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 App Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Name:** ${{ github.event.inputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ github.event.inputs.web_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Flutter:** ${{ env.FLUTTER_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📦 APK Structure Verification" >> $GITHUB_STEP_SUMMARY
          echo "✅ Required items found:" >> $GITHUB_STEP_SUMMARY
          echo "- assets/dexopt/" >> $GITHUB_STEP_SUMMARY
          echo "- assets/flutter_assets/" >> $GITHUB_STEP_SUMMARY
          echo "- kotlin/" >> $GITHUB_STEP_SUMMARY
          echo "- lib/" >> $GITHUB_STEP_SUMMARY
          echo "- META-INF/" >> $GITHUB_STEP_SUMMARY
          echo "- res/" >> $GITHUB_STEP_SUMMARY
          echo "- AndroidManifest.xml" >> $GITHUB_STEP_SUMMARY
          echo "- classes.dex" >> $GITHUB_STEP_SUMMARY
          echo "- resources.arsc" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔗 Download" >> $GITHUB_STEP_SUMMARY
          echo "[Download APK](${{ steps.create_release.outputs.release_url }})" >> $GITHUB_STEP_SUMMARY

      # ==================== CLEANUP ====================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up workspace..."
          rm -rf ${{ steps.create_project.outputs.project_dir }} 2>/dev/null || true
          rm -rf output 2>/dev/null || true
          echo "✅ Cleanup completed"

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}